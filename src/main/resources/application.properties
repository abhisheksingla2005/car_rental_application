spring.application.name=carRentalApplication

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/carrentalapplication?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1677
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server configuration - Using port 0 for dynamic port assignment
server.port=0
server.servlet.context-path=/

# Logging
logging.level.com.example.carRentalApplication=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Web configuration
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
